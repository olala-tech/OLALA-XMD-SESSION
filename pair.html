<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pair Code</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      background: url("https://files.catbox.moe/5ErmfFy.jpg") no-repeat center center/cover;
      font-family: "Poppins", sans-serif;
      color: #fff;
      text-shadow: 1px 1px 4px black;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 340px;
      min-height: 360px;
      padding: 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(255, 0, 100, 0.6), 0 0 50px rgba(155, 0, 255, 0.4);
      animation: fadeIn 1.5s ease-in-out;
    }

    #text {
      color: #f6f5f5;
    }

    h3 {
      font-size: 1.4rem;
      background: linear-gradient(90deg, #ff0080, #b400ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: bold;
      letter-spacing: 1px;
    }

    h6 {
      color: #dcdcdc;
      margin: 4px 0;
      font-weight: normal;
    }

    .input-container {
      display: flex;
      margin-top: 15px;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }

    .input-container input {
      background: #1e1e1e;
      width: 100%;
      padding: 0.9rem;
      border: none;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    .input-container input::placeholder {
      color: #bbb;
    }

    .input-container button {
      padding: 0.9rem;
      background: linear-gradient(135deg, #c01736, #8b17b6);
      font-weight: bold;
      letter-spacing: 0.1rem;
      text-transform: uppercase;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .input-container button:hover {
      background: linear-gradient(135deg, #ff0077, #9d00ff);
      box-shadow: 0 0 15px rgba(255, 0, 200, 0.6);
      transform: scale(1.05);
    }

    .centered-text {
      text-align: center;
      color: #e9e4e4;
    }

    footer {
      margin-top: 15px;
      font-size: 0.8rem;
      color: #ccc;
      text-shadow: 1px 1px 3px black;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 500px) {
      .box {
        width: 90%; 
      }
      .input-container {
        flex-direction: column;
      }
      .input-container button {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main">
      <div class="box" id="box">
        <div id="text">
          <i class="fa fa-user fa-2x"></i>
          <p>
            <h3 class="centered-text">OLALA-XMD-SESSION PAIR CODE</h3>
            <h6>✨ Created By OLALA™ ✨</h6>
            <h6>Enter Your Number with Country Code.</h6>
            <div class="input-container">
              <input placeholder="254798xxx" type="number" id="number" name="">
              <button id="submit">Submit</button>
            </div>
            <a id="waiting-message" class="centered-text" style="display: none;">Please wait a moment...</a>
            <br><br>
            <main id="pair"></main>
          </p>
        </div>
      </div>
    </div>
    <footer>© 2026 OLALA-NET-TECH. All Rights Reserved.</footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let text = document.getElementById("copy").innerText;
      let obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerText = "COPIED";
      obj.style = "color:lime;font-weight:bold";
      setTimeout(() => {
        obj.innerText = text;
        obj.style = "color:red;font-weight:bold";
      }, 600);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<a style="color:yellow;font-weight:bold">⚠ Enter your WhatsApp number with Country Code</a><br><br>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<a style="color:black;font-weight:bold">❌ Invalid Number</a><br><br>';
      } else {
        const Nick = c.value.replace(/[^0-9]/g, "");
        c.type = "text";
        c.value = "+" + Nick;
        c.style = "color:#fff;font-size:18px;background:#111";
        a.innerHTML = '<a style="color:cyan;font-weight:bold">⏳ Please Wait...</a><br><br>';
        let { data } = await axios(`/code?number=${Nick}`);
        let code = data.code || "Service Unavailable";
        a.innerHTML = '<font id="copy" onclick="Copy()" style="color:red;font-weight:bold;cursor:pointer" size="5">CODE: <span style="color:white;font-weight:bold">' + code + '</span></font><br><br>';
      }
    });
  </script>
</body>
</html>
